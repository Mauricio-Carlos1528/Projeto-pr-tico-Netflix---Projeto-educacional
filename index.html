<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Netflix - Selecionar Perfil</title>
    <link rel="stylesheet" href="STYLE.CSS" />
  </head>
  <body>
    <header>
      <h1>Quem está assistindo?</h1>
      <!-- Botão de alternância de tema (dark / light) -->
      <button id="theme-toggle" aria-pressed="false" aria-label="Alternar tema" title="Alternar tema">
        🌙
      </button>
    </header>

    <main>
      <!-- Estrutura semântica: ul não ordenada que contém uma lista ordenada de perfis -->
      <ul class="profiles">
          <ol>
            <li class="profile">
              <figure>
                <img src="assets/perfil-1.jpg" alt="Avatar do Perfil 1"/>
                <figcaption>Gabriel</figcaption>
              </figure>
            </li>

            <li class="profile">
              <figure>
                <img src="assets/perfil-2.jpg" alt="Avatar do Perfil 2"/>
                <figcaption>Mateus</figcaption>
              </figure>
            </li>

            <li class="profile">
              <figure>
                <img src="assets/perfil-3.jpg" alt="Avatar do Perfil 3"/>
                <figcaption> Andressa</figcaption>
              </figure>
            </li>
          </ol>
      </ul>

         <section class="gerenciar">
            <button type="button" class="botao-gerenciar">Gerenciar perfis</button>
        </section>

    </main>

    <footer>
      <p>&copy; 2026 Netflix Clone - Projeto Educacional</p>
    </footer>
    <script src="theme-toggle.js" defer></script>
  </body>
</html>
