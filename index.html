<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Netflix - Selecionar Perfil</title>
    <link rel="stylesheet" href="STYLE.CSS" />
  </head>
  <body>
    <header>
      <h1>Quem está assistindo?</h1>
      <!-- Botão de alternância de tema (dark / light) -->
      <button id="theme-toggle" aria-pressed="false" aria-label="Alternar tema" title="Alternar tema">
        🌙
      </button>
    </header>

    <main>
      <section class="profiles">
        <article class="profile">
          <figure>
            <img src="assets/Gemini_Generated_Image_xha0mnxha0mnxha0.png" alt="Avatar do Perfil 1"/>
            <figcaption> Ilustração</figcaption>
          </figure>
        </article>

        <article class="profile">
          <figure>
            <img src="assets/dynamite_2.webp" alt="Avatar do Perfil 2"/>

            <figcaption>A explosão </figcaption>
          </figure>
        </article>
      </section>

       
        <article class="profile">
          <figure>
            <img src="assets/cinematic.webp" alt="Avatar do Perfil 3"/>
            <figcaption> O pensador do futuro</figcaption>
          </figure>
        </article>

        <article class="profile">
          <figure>
            <img 
              src="assets/ovine.webp" alt="Avatar do Perfil 4"/>
            <figcaption> A invasão</figcaption>
          </figure>
        </article>
      </section>

    </main>

    <footer>
      <p>&copy; 2026 Netflix Clone - Projeto Educacional</p>
    </footer>
    <script src="theme-toggle.js" defer></script>
  </body>
</html>
